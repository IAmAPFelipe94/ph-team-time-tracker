<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH Team Time Tracker by AP</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#14181F; --surface:#1B212A; --surface-2:#222A35; --surface-3:#293241;
    --border:#2B333E; --border-strong:#3A4453; --text:#ECE9E2; --text-dim:#9099A8; --text-faint:#5E6675;
    --accent:#E8A23D; --accent-dim:#B97A22; --accent-soft:rgba(232,162,61,0.14);
    --green:#5FBF8F; --green-soft:rgba(95,191,143,0.14);
    --red:#E2685A; --red-soft:rgba(226,104,90,0.14);
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}
  #app{max-width:980px;margin:0 auto;padding:28px 20px 60px;}

  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:34px;height:30px;border-radius:6px;background:var(--accent);color:#1A1306;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:12px;letter-spacing:0.3px;}
  .brand h1{font-family:'Space Grotesk';font-weight:600;font-size:18px;margin:0;letter-spacing:0.2px;}
  .brand p{margin:0;font-size:12px;color:var(--text-faint);}

  .tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:10px;border:1px solid var(--border);}
  .tab-btn{appearance:none;border:none;background:transparent;color:var(--text-dim);font-family:'Inter';font-size:13px;font-weight:500;padding:8px 16px;border-radius:7px;cursor:pointer;}
  .tab-btn.active{background:var(--surface-3);color:var(--text);}
  .tab-btn:hover:not(.active){color:var(--text);}

  .user-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 6px 5px 12px;font-size:12.5px;color:var(--text-dim);}
  .user-pill .avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;font-family:'Space Grotesk';}
  .user-pill button{appearance:none;border:none;background:var(--surface-2);color:var(--text-faint);font-size:11px;padding:5px 10px;border-radius:14px;cursor:pointer;}
  .user-pill button:hover{color:var(--red);}
  .admin-badge{font-size:9.5px;text-transform:uppercase;letter-spacing:0.4px;background:var(--accent-soft);color:var(--accent);padding:2px 6px;border-radius:10px;}

  .punch-bar{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px;overflow:hidden;}
  .punch-bar::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background-image:repeating-linear-gradient(90deg,var(--accent) 0 8px, transparent 8px 16px);opacity:0.55;}
  .punch-bar input[type=text]{flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px 12px;font-size:13.5px;font-family:'Inter';outline:none;}
  .punch-bar input[type=text]:focus{border-color:var(--border-strong);}
  .punch-bar select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px 10px;font-size:13px;font-family:'Inter';outline:none;max-width:160px;}
  .timer-readout{font-family:'JetBrains Mono';font-size:21px;font-weight:500;min-width:104px;text-align:right;color:var(--text);letter-spacing:0.5px;}
  .timer-readout.running{color:var(--green);}
  .punch-btn{appearance:none;border:none;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--accent);color:#1A1306;flex-shrink:0;}
  .punch-btn:active{transform:scale(0.93);}
  .punch-btn.stop{background:var(--red);color:#2A0E0A;}
  .punch-btn svg{width:16px;height:16px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .card-head h2{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin:0;}
  .week-nav{display:flex;align-items:center;gap:10px;}
  .nav-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .nav-btn:hover{color:var(--text);border-color:var(--border-strong);}
  .week-label{font-size:13px;color:var(--text-dim);min-width:150px;text-align:center;}
  .btn{appearance:none;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-family:'Inter';font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:7px;cursor:pointer;}
  .btn:hover{border-color:var(--border-strong);}
  .btn:disabled{opacity:0.4;cursor:default;}
  .btn.primary{background:var(--accent-soft);border-color:var(--accent-dim);color:var(--accent);}
  .btn.primary:hover{background:rgba(232,162,61,0.22);}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--text-faint);padding:6px 8px;}
  .btn.ghost:hover{color:var(--red);}

  table.sheet{width:100%;border-collapse:collapse;font-size:13px;}
  table.sheet th{text-align:center;font-weight:500;color:var(--text-faint);font-size:11px;text-transform:uppercase;letter-spacing:0.4px;padding:6px 4px 10px;}
  table.sheet th.row-label{text-align:left;padding-left:4px;}
  table.sheet td{padding:6px 4px;border-top:1px solid var(--border);vertical-align:middle;}
  table.sheet tr.entry-row:hover td{background:rgba(255,255,255,0.015);}
  .row-label-cell{display:flex;align-items:center;gap:9px;min-width:210px;}
  .proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .row-text{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .row-proj{font-size:11px;color:var(--text-faint);}
  .row-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
  .row-desc-input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12.5px;width:100%;outline:none;}
  .row-select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 6px;font-size:11.5px;outline:none;max-width:120px;}
  td.cell{text-align:center;}
  .cell input{width:48px;text-align:center;background:transparent;border:1px solid transparent;color:var(--text);border-radius:6px;padding:6px 2px;font-family:'JetBrains Mono';font-size:12.5px;outline:none;}
  .cell input:hover{border-color:var(--border);}
  .cell input:focus{border-color:var(--accent-dim);background:var(--surface-2);}
  .cell.today{background:var(--accent-soft);border-radius:6px;}
  td.row-total{text-align:center;font-family:'JetBrains Mono';font-weight:500;color:var(--accent);font-size:13px;}
  td.row-del{width:30px;text-align:center;}
  tr.totals-row td{border-top:1px solid var(--border-strong);font-family:'JetBrains Mono';font-weight:600;padding-top:10px;}
  tr.totals-row td.row-total{font-size:14px;}
  .day-head{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .day-head .dow{font-size:10.5px;}
  .day-head .dom{font-family:'JetBrains Mono';font-size:12px;color:var(--text-dim);font-weight:400;text-transform:none;}
  th.today-head .dom{color:var(--accent);}
  .empty-state{text-align:center;padding:30px 10px;color:var(--text-faint);font-size:13px;}

  .range-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{appearance:none;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;}
  .pill.active{background:var(--accent-soft);border-color:var(--accent-dim);color:var(--accent);}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .stat-box{background:var(--surface-2);border-radius:9px;padding:14px 16px;}
  .stat-box .label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
  .stat-box .value{font-family:'JetBrains Mono';font-size:21px;font-weight:500;}
  .bar-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--border);}
  .bar-row:first-of-type{border-top:none;}
  .bar-label{min-width:150px;display:flex;align-items:center;gap:8px;font-size:13px;}
  .bar-track{flex:1;height:7px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;}
  .bar-amt{font-family:'JetBrains Mono';font-size:12.5px;color:var(--text-dim);min-width:74px;text-align:right;}
  .export-row{display:flex;gap:8px;flex-wrap:wrap;}

  .task-row td{border-top:none;padding-top:0;padding-bottom:14px;}
  .task-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .task-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);font-size:11.5px;padding:4px 6px 4px 10px;border-radius:14px;}
  .task-chip button{appearance:none;border:none;background:transparent;color:var(--text-faint);cursor:pointer;font-size:11px;padding:2px 4px;line-height:1;}
  .task-chip button:hover{color:var(--red);}
  .task-add{display:flex;gap:8px;align-items:center;}
  .task-add input{flex:0 1 280px;}

  .login-shell{max-width:380px;margin:80px auto;text-align:center;}
  .login-shell .brand-mark{margin:0 auto 18px;width:50px;height:46px;font-size:16px;}
  .login-shell h1{font-family:'Space Grotesk';font-size:20px;margin:0 0 6px;}
  .login-shell p{color:var(--text-faint);font-size:13px;margin:0 0 24px;}
  .login-shell input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:12px;}
  .login-shell .btn.primary{width:100%;padding:12px;font-size:13.5px;}
  .login-note{font-size:12px;color:var(--text-faint);margin-top:16px;}
  .login-note.success{color:var(--green);}
  .login-note.error{color:var(--red);}

  ::placeholder{color:var(--text-faint);}
  select option{background:var(--surface-2);}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){

const SUPABASE_URL = 'https://frfjbyttfryljearnfdu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyZmpieXR0ZnJ5bGplYXJuZmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDYwNDksImV4cCI6MjA5ODM4MjA0OX0.CSGuGA52j1MRtRTIc4Jlt3p_KqKx0ziz3o_1TpMdXjo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PROJECT_COLORS = ['#E8A23D','#5FBF8F','#6FA8DC','#C77DFF','#E2685A','#4ED8D8','#F2C14E','#9AA7B0'];
const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let session = null;
let profile = null;
let teamProfiles = [];
let projects = [];
let entries = [];
let templates = [];
let timer = null;
let activeTab = 'timesheet';
let weekStart = mondayOf(new Date());
let draftRows = [];
let reportRange = 'week';
let timerInterval = null;
let loaded = false;
let loginNote = '';
let loginNoteType = '';
let selectedTemplateId = null;
let teamUserFilter = 'all';

function uid(){ return Math.random().toString(36).slice(2,10); }
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function fmtDate(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function todayStr(){ return fmtDate(new Date()); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtHours(h){ if(!h) return ''; return (Math.round(h*100)/100).toString(); }
function hoursToHM(h){ const tm=Math.round(h*60); return Math.floor(tm/60)+'h '+String(tm%60).padStart(2,'0')+'m'; }
function fmtHHMM(hours){ const tm=Math.round((hours||0)*60); const h=Math.floor(tm/60), m=tm%60; return h+':'+String(m).padStart(2,'0'); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(email){ return (email||'??').slice(0,2).toUpperCase(); }

// ---------------- auth ----------------
async function sendMagicLink(email){
  loginNote = 'Sending link…'; loginNoteType=''; render();
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.href } });
  if(error){ loginNote = error.message; loginNoteType='error'; }
  else{ loginNote = 'Check '+email+' for a sign-in link.'; loginNoteType='success'; }
  render();
}
async function signOut(){ await sb.auth.signOut(); session=null; profile=null; render(); }

async function ensureProfile(){
  const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  if(data){ profile = data; return; }
  const { data: created } = await sb.from('profiles').insert({ id: session.user.id, email: session.user.email }).select().maybeSingle();
  profile = created || { id: session.user.id, email: session.user.email, is_admin:false };
}

// ---------------- data load ----------------
async function loadAll(){
  loaded = false; render();
  await ensureProfile();
  await Promise.all([loadProjects(), loadEntries(), loadTemplates()]);
  if(profile.is_admin) await loadTeamProfiles();
  loaded = true;
  render();
}
async function loadProjects(){
  const { data } = await sb.from('projects').select('*').order('created_at');
  projects = (data||[]).map(p=>({ id:p.id, name:p.name, client:p.client||'', color:p.color, tasks:p.tasks||[], owner_id:p.owner_id }));
  if(!projects.length){
    await sb.from('projects').insert([
      {owner_id:session.user.id, name:'General', client:'Internal', color:PROJECT_COLORS[0], tasks:[]},
      {owner_id:session.user.id, name:'Client work', client:'', color:PROJECT_COLORS[1], tasks:[]},
    ]);
    const r = await sb.from('projects').select('*').order('created_at');
    projects = (r.data||[]).map(p=>({ id:p.id, name:p.name, client:p.client||'', color:p.color, tasks:p.tasks||[], owner_id:p.owner_id }));
  }
}
function mapEntry(r){ return { id:r.id, user_id:r.user_id, projectId:r.project_id, description:r.description||'', date:r.date, hours:r.hours }; }
async function loadEntries(){
  let q = sb.from('entries').select('*');
  if(!profile.is_admin) q = q.eq('user_id', session.user.id);
  const { data } = await q;
  entries = (data||[]).map(mapEntry);
}
async function loadTemplates(){
  const { data } = await sb.from('templates').select('*').eq('user_id', session.user.id);
  templates = data || [];
}
async function loadTeamProfiles(){
  const { data } = await sb.from('profiles').select('*');
  teamProfiles = data || [];
}

function projectById(id){ return projects.find(p=>p.id===id); }
function profileById(id){ return teamProfiles.find(p=>p.id===id) || (profile && profile.id===id ? profile : null); }
function totalTrackedForProject(id){ return entries.filter(e=>e.projectId===id).reduce((a,b)=>a+b.hours,0); }

// ---------------- project + task management (admin only) ----------------
async function addProject(name, client){
  if(!name || !name.trim()) return false;
  const color = PROJECT_COLORS[projects.length % PROJECT_COLORS.length];
  const { data } = await sb.from('projects').insert({owner_id:session.user.id, name:name.trim(), client:(client||'').trim(), color, tasks:[]}).select().maybeSingle();
  if(data) projects.push({ id:data.id, name:data.name, client:data.client||'', color:data.color, tasks:data.tasks||[], owner_id:data.owner_id });
  return true;
}
async function deleteProject(id){
  await sb.from('entries').delete().eq('project_id', id);
  await sb.from('projects').delete().eq('id', id);
  projects = projects.filter(p=>p.id!==id);
  entries = entries.filter(e=>e.projectId!==id);
  draftRows = draftRows.filter(d=>d.projectId!==id);
}
async function renameProject(id, field, value){
  const p = projectById(id);
  if(!p) return;
  p[field] = value;
  await sb.from('projects').update({[field]:value}).eq('id', id);
}
async function addTaskToProject(pid, name){
  if(!name || !name.trim()) return false;
  const p = projectById(pid);
  if(!p) return false;
  if(!p.tasks) p.tasks=[];
  p.tasks.push({id:uid(), name:name.trim()});
  await sb.from('projects').update({tasks:p.tasks}).eq('id', pid);
  return true;
}
async function removeTaskFromProject(pid, tid){
  const p = projectById(pid);
  if(!p) return;
  p.tasks = (p.tasks||[]).filter(t=>t.id!==tid);
  await sb.from('projects').update({tasks:p.tasks}).eq('id', pid);
}

// ---------------- timer (local only, not synced across devices) ----------------
function startTimer(projectId, description){
  if(!projectId) projectId = projects[0] && projects[0].id;
  timer = {projectId, description: description||'', startedAt: Date.now()};
  sessionStorage.setItem('phtt_timer', JSON.stringify(timer));
  render();
}
async function stopTimer(){
  if(!timer) return;
  const elapsedHours = (Date.now()-timer.startedAt)/3600000;
  if(elapsedHours > 0.0005){
    await addOrMergeEntry(timer.projectId, timer.description, todayStr(), elapsedHours);
  }
  timer = null;
  sessionStorage.removeItem('phtt_timer');
  render();
}
async function addOrMergeEntry(projectId, description, date, hours){
  const existing = entries.find(e=>e.user_id===session.user.id && e.projectId===projectId && e.description===description && e.date===date);
  if(existing){
    const newHours = Math.round((existing.hours+hours)*100)/100;
    await sb.from('entries').update({hours:newHours}).eq('id', existing.id);
    existing.hours = newHours;
  }else{
    const { data } = await sb.from('entries').insert({user_id:session.user.id, project_id:projectId, description, date, hours: Math.round(hours*100)/100}).select().maybeSingle();
    if(data) entries.push(mapEntry(data));
  }
}

// ---------------- timesheet helpers ----------------
function weekDates(){ const arr=[]; for(let i=0;i<7;i++) arr.push(addDays(weekStart,i)); return arr; }
function scopedEntries(){
  if(profile.is_admin && teamUserFilter!=='all') return entries.filter(e=>e.user_id===teamUserFilter);
  if(profile.is_admin) return entries.filter(e=>e.user_id===session.user.id);
  return entries;
}
function weekEntries(){
  const days = weekDates().map(fmtDate);
  const start=days[0], end=days[6];
  return scopedEntries().filter(e=> e.date>=start && e.date<=end);
}
function groupRowsForWeek(){
  const we = weekEntries();
  const map = new Map();
  we.forEach(e=>{
    const key = e.projectId+'|'+e.description;
    if(!map.has(key)) map.set(key, {key, projectId:e.projectId, description:e.description, byDate:{}});
    map.get(key).byDate[e.date] = (map.get(key).byDate[e.date]||0) + e.hours;
  });
  const rows = Array.from(map.values());
  draftRows.forEach(d=>{ if(!map.has(d.key)) rows.push({key:d.key, projectId:d.projectId, description:d.description, byDate:{}, draft:true}); });
  return rows;
}
async function setCellHours(row, dateStr, value){
  const hours = parseFloat(value);
  const projectId = row.projectId, description = row.description;
  const existing = entries.find(e=>e.user_id===session.user.id && e.projectId===projectId && e.description===description && e.date===dateStr);
  if(isNaN(hours) || hours<=0){
    if(existing){ await sb.from('entries').delete().eq('id', existing.id); entries = entries.filter(e=>e.id!==existing.id); }
  }else{
    const rounded = Math.round(hours*100)/100;
    if(existing){ await sb.from('entries').update({hours:rounded}).eq('id', existing.id); existing.hours=rounded; }
    else{
      const { data } = await sb.from('entries').insert({user_id:session.user.id, project_id:projectId, description, date:dateStr, hours:rounded}).select().maybeSingle();
      if(data) entries.push(mapEntry(data));
    }
  }
  draftRows = draftRows.filter(d=>d.key!==row.key);
  render();
}
async function deleteRow(row){
  const days = weekDates().map(fmtDate);
  const toDelete = entries.filter(e=>e.user_id===session.user.id && e.projectId===row.projectId && e.description===row.description && days.includes(e.date));
  for(const e of toDelete){ await sb.from('entries').delete().eq('id', e.id); }
  const ids = new Set(toDelete.map(e=>e.id));
  entries = entries.filter(e=>!ids.has(e.id));
  draftRows = draftRows.filter(d=>d.key!==row.key);
  render();
}

// ---------------- templates ----------------
async function saveCurrentWeekAsTemplate(name){
  const rows = groupRowsForWeek().filter(r=>!r.draft);
  const days = weekDates().map(fmtDate);
  if(!rows.length) return false;
  const tplRows = rows.map(r=>({ projectId:r.projectId, description:r.description, hoursByDow: days.map(d=>r.byDate[d]||0) }));
  const { data } = await sb.from('templates').insert({user_id:session.user.id, name:name||'Untitled template', rows:tplRows}).select().maybeSingle();
  if(data) templates.push(data);
  return true;
}
async function deleteTemplate(id){
  await sb.from('templates').delete().eq('id', id);
  templates = templates.filter(t=>t.id!==id);
  if(selectedTemplateId===id) selectedTemplateId=null;
  render();
}
async function applyTemplateToWeekStart(template, startDate){
  const days = []; for(let i=0;i<7;i++) days.push(fmtDate(addDays(startDate,i)));
  for(const r of template.rows){
    for(let i=0;i<r.hoursByDow.length;i++){
      const h = r.hoursByDow[i]; if(!h) continue;
      const date = days[i];
      const existing = entries.find(e=>e.user_id===session.user.id && e.projectId===r.projectId && e.description===r.description && e.date===date);
      if(existing){ await sb.from('entries').update({hours:h}).eq('id', existing.id); existing.hours=h; }
      else{
        const { data } = await sb.from('entries').insert({user_id:session.user.id, project_id:r.projectId, description:r.description, date, hours:h}).select().maybeSingle();
        if(data) entries.push(mapEntry(data));
      }
    }
  }
}
async function applyTemplateToCurrentWeek(template){ await applyTemplateToWeekStart(template, weekStart); render(); }
async function applyTemplateToCurrentMonth(template){
  const ref = weekStart;
  const monthStart = new Date(ref.getFullYear(), ref.getMonth(), 1);
  const monthEnd = new Date(ref.getFullYear(), ref.getMonth()+1, 0);
  let cursor = mondayOf(monthStart);
  while(cursor <= monthEnd){ await applyTemplateToWeekStart(template, cursor); cursor = addDays(cursor,7); }
  render();
}

// ---------------- reports ----------------
function reportDateRange(){
  const today = new Date();
  if(reportRange==='week'){ const s=mondayOf(today); return [fmtDate(s), fmtDate(addDays(s,6))]; }
  if(reportRange==='lastweek'){ const s=addDays(mondayOf(today),-7); return [fmtDate(s), fmtDate(addDays(s,6))]; }
  if(reportRange==='month'){ const s=new Date(today.getFullYear(),today.getMonth(),1); const e=new Date(today.getFullYear(),today.getMonth()+1,0); return [fmtDate(s), fmtDate(e)]; }
  return ['0000-01-01','9999-12-31'];
}
function reportEntries(){
  const [s,e] = reportDateRange();
  let pool = profile.is_admin ? entries : entries.filter(x=>x.user_id===session.user.id);
  if(profile.is_admin && teamUserFilter!=='all') pool = pool.filter(x=>x.user_id===teamUserFilter);
  return pool.filter(x=>x.date>=s && x.date<=e);
}
function reportByProject(){
  const re = reportEntries();
  const map = new Map();
  re.forEach(e=>{ map.set(e.projectId, (map.get(e.projectId)||0)+e.hours); });
  return Array.from(map.entries()).map(([projectId,hours])=>({projectId,hours})).sort((a,b)=>b.hours-a.hours);
}
function reportByUser(){
  const re = reportEntries();
  const map = new Map();
  re.forEach(e=>{ map.set(e.user_id, (map.get(e.user_id)||0)+e.hours); });
  return Array.from(map.entries()).map(([userId,hours])=>({userId,hours})).sort((a,b)=>b.hours-a.hours);
}
function rangeLabelText(){
  const [s,e] = reportDateRange();
  if(reportRange==='all') return 'All time';
  const fmt=(d)=>{ const [y,mo,da]=d.split('-'); return da+'/'+mo+'/'+y; };
  return fmt(s)+' - '+fmt(e);
}
function csvEsc(s){ s=String(s); if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"'; return s; }
function downloadFile(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function exportCsv(){
  const re = reportEntries().slice().sort((a,b)=>a.date.localeCompare(b.date));
  let csv = profile.is_admin ? 'Date,Person,Project,Description,Hours\n' : 'Date,Project,Description,Hours\n';
  re.forEach(e=>{
    const proj = projectById(e.projectId);
    const row = profile.is_admin
      ? [e.date, csvEsc((profileById(e.user_id)||{}).email||e.user_id), csvEsc(proj?proj.name:'Unknown'), csvEsc(e.description||''), e.hours]
      : [e.date, csvEsc(proj?proj.name:'Unknown'), csvEsc(e.description||''), e.hours];
    csv += row.join(',')+'\n';
  });
  downloadFile(csv, 'timesheet_export.csv', 'text/csv');
}
function exportSummaryCsv(){
  const rows = reportByProject();
  let csv = 'Project,Total Hours\n';
  rows.forEach(r=>{ const proj=projectById(r.projectId); csv += [csvEsc(proj?proj.name:'Unknown'), Math.round(r.hours*100)/100].join(',')+'\n'; });
  downloadFile(csv, 'timesheet_summary.csv', 'text/csv');
}
function exportDetailedXlsx(){
  if(typeof XLSX==='undefined'){ alert('Export library is still loading, try again in a moment.'); return; }
  const re = reportEntries().slice().sort((a,b)=> a.date.localeCompare(b.date));
  const rows = re.map(e=>{
    const proj = projectById(e.projectId);
    const base = {
      Date: e.date,
      Project: proj ? proj.name : 'Unknown',
      Client: proj ? proj.client : '',
      Description: e.description || '(Without description)',
      Duration: fmtHHMM(e.hours),
      Hours: Math.round(e.hours*100)/100,
    };
    if(profile.is_admin) base.Person = (profileById(e.user_id)||{}).email || e.user_id;
    return base;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:30},{wch:20},{wch:30},{wch:10},{wch:10},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Detailed report');
  XLSX.writeFile(wb, 'timesheet_detailed_'+reportRange+'.xlsx');
}
function drawDonutDataUrl(byProj, total){
  const size=360, cx=size/2, cy=size/2, rOuter=150, rInner=92;
  const canvas=document.createElement('canvas'); canvas.width=size; canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,size,size);
  let start=-Math.PI/2;
  byProj.forEach(r=>{
    const frac = total ? r.hours/total : 0;
    const end = start + frac*Math.PI*2;
    const proj = projectById(r.projectId);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,rOuter,start,end); ctx.closePath();
    ctx.fillStyle = proj ? proj.color : '#9AA7B0'; ctx.fill();
    start = end;
  });
  ctx.beginPath(); ctx.arc(cx,cy,rInner,0,Math.PI*2); ctx.fillStyle='#FFFFFF'; ctx.fill();
  ctx.fillStyle='#222222'; ctx.font='600 22px Helvetica'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(fmtHHMM(total), cx, cy);
  return canvas.toDataURL('image/png');
}
function hexToRgb(hex){ const v=hex.replace('#',''); return { r:parseInt(v.substr(0,2),16), g:parseInt(v.substr(2,2),16), b:parseInt(v.substr(4,2),16) }; }
function exportSummaryPdf(){
  if(typeof window.jspdf==='undefined'){ alert('Export library is still loading, try again in a moment.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const byProj = reportByProject();
  const total = byProj.reduce((a,b)=>a+b.hours,0);
  const marginX = 48; let y = 56;

  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(20,24,31);
  doc.text('Summary report', marginX, y); y += 22;
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(110,116,128);
  doc.text(rangeLabelText(), marginX, y); y += 30;

  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110,116,128);
  doc.text('Total', marginX, y);
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(20,24,31);
  doc.text(fmtHHMM(total), marginX, y+18); y += 46;

  doc.setDrawColor(225,225,225); doc.line(marginX, y, 547, y); y += 28;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(20,24,31);
  doc.text('Project', marginX, y); y += 14;

  if(byProj.length){
    const chartDataUrl = drawDonutDataUrl(byProj, total);
    const chartSize = 150;
    doc.addImage(chartDataUrl, 'PNG', marginX, y, chartSize, chartSize);
    let ty = y + 4;
    const listX = marginX + chartSize + 28;
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
    byProj.forEach(r=>{
      const proj = projectById(r.projectId);
      const pct = total ? Math.round((r.hours/total)*1000)/10 : 0;
      const c = proj ? hexToRgb(proj.color) : {r:154,g:167,b:176};
      doc.setFillColor(c.r,c.g,c.b); doc.circle(listX, ty-3.5, 3.5, 'F');
      doc.setTextColor(40,44,52);
      const label = (proj?proj.name:'Unknown') + (proj && proj.client ? ' — '+proj.client : '');
      doc.text(label, listX+12, ty);
      doc.setTextColor(110,116,128);
      doc.text(fmtHHMM(r.hours)+'   '+pct+'%', 500, ty, {align:'right'});
      ty += 20;
    });
    y += chartSize + 30;
  }else{
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(140,140,140);
    doc.text('No entries in this range yet.', marginX, y+10); y += 30;
  }

  doc.setDrawColor(225,225,225); doc.line(marginX, y, 547, y); y += 30;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(20,24,31);
  doc.text('Entries', marginX, y); y += 16;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(140,144,152);
  doc.text('Date', marginX, y);
  doc.text(profile.is_admin ? 'Person / Project' : 'Project', marginX+70, y);
  doc.text('Duration', 500, y, {align:'right'});
  y += 10;
  doc.setDrawColor(235,235,235); doc.line(marginX, y, 547, y); y += 14;

  const re = reportEntries().slice().sort((a,b)=>a.date.localeCompare(b.date));
  doc.setFontSize(9.5);
  re.forEach(e=>{
    if(y > 770){ doc.addPage(); y = 56; }
    const proj = projectById(e.projectId);
    doc.setTextColor(60,64,72);
    doc.text(e.date, marginX, y);
    let label = (proj?proj.name:'Unknown') + (e.description ? ' — '+e.description : '');
    if(profile.is_admin) label = ((profileById(e.user_id)||{}).email || '?') + ' · ' + label;
    doc.text(label.length>66 ? label.slice(0,64)+'…' : label, marginX+70, y);
    doc.text(fmtHHMM(e.hours), 500, y, {align:'right'});
    y += 15;
  });

  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(170,170,170);
  doc.text('Generated with PH Team Time Tracker by AP', marginX, 815);
  doc.save('timesheet_summary_'+reportRange+'.pdf');
}

// ---------------- rendering ----------------
function render(){
  const app = document.getElementById('app');
  if(!session){ app.innerHTML = renderLogin(); attachLoginHandlers(); return; }
  if(!loaded){ app.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-faint);">Loading your timesheet…</div>'; return; }
  app.innerHTML = `
    ${renderHeader()}
    ${renderPunchBar()}
    ${activeTab==='timesheet' ? renderTimesheet() : activeTab==='reports' ? renderReports() : activeTab==='projects' ? renderProjects() : renderTeam()}
  `;
  attachHandlers();
  if(timer){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimerReadout, 1000);
  }
}

function renderLogin(){
  return `
  <div class="login-shell">
    <div class="brand-mark">AP</div>
    <h1>PH Team Time Tracker</h1>
    <p>Sign in with your work email to track your team's hours.</p>
    <input type="email" id="loginEmail" placeholder="you@yourcompany.com" autocomplete="email"/>
    <button class="btn primary" id="loginBtn">Send magic link</button>
    ${loginNote ? `<div class="login-note ${loginNoteType}">${escapeHtml(loginNote)}</div>` : ''}
  </div>`;
}
function attachLoginHandlers(){
  const btn = document.getElementById('loginBtn');
  const emailInput = document.getElementById('loginEmail');
  if(btn) btn.onclick = ()=>{
    const email = (emailInput.value||'').trim();
    if(!email){ loginNote='Enter your email first.'; loginNoteType='error'; render(); return; }
    sendMagicLink(email);
  };
  if(emailInput) emailInput.addEventListener('keydown', e=>{ if(e.key==='Enter') btn.click(); });
}

function renderHeader(){
  return `

    </div>

function renderPunchBar(){
  const projOptions = projects.map(p=>`<option value="${p.id}" ${timer && timer.projectId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
  let readout='0:00:00', running=false;
  if(timer){ running=true; readout=elapsedReadout(); }
  const currentProjId = timer ? timer.projectId : (projects[0] && projects[0].id);
  const currentTasks = (projectById(currentProjId)||{}).tasks || [];
  return `
  <div class="punch-bar">
    <select id="timerProject" ${timer?'disabled':''}>${projOptions}</select>
    <input type="text" id="timerDesc" placeholder="Pick a task or type your own" value="${escapeHtml(timer?timer.description:'')}" ${timer?'disabled':''} list="timerTasks"/>
    <datalist id="timerTasks">${currentTasks.map(t=>`<option value="${escapeHtml(t.name)}"></option>`).join('')}</datalist>
    <div class="timer-readout mono ${running?'running':''}" id="timerReadout">${readout}</div>
    <button class="punch-btn ${running?'stop':''}" id="punchBtn" aria-label="${running?'Stop timer':'Start timer'}">${running?stopIcon():playIcon()}</button>
  </div>`;
}
function playIcon(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`; }
function stopIcon(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>`; }
function elapsedReadout(){
  if(!timer) return '0:00:00';
  const sec = Math.floor((Date.now()-timer.startedAt)/1000);
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function updateTimerReadout(){ const el=document.getElementById('timerReadout'); if(el) el.textContent=elapsedReadout(); }

function renderTimesheet(){
  const days = weekDates();
  const today = todayStr();
  const rows = groupRowsForWeek();
  const dayHeaders = days.map((d,i)=>{
    const ds=fmtDate(d); const isToday=ds===today;
    return `<th class="${isToday?'today-head':''}"><div class="day-head"><span class="dow">${DOW[i]}</span><span class="dom">${d.getDate()}</span></div></th>`;
  }).join('');

  let bodyRows='';
  if(rows.length===0){
    bodyRows = `<tr><td colspan="9"><div class="empty-state">No hours logged this week yet. Add a row to start your timesheet.</div></td></tr>`;
  }else{
    rows.forEach(row=>{
      const proj = projectById(row.projectId) || projects[0];
      let total=0;
      const cells = days.map(d=>{
        const ds=fmtDate(d); const val=row.byDate[ds]||0; total+=val; const isToday=ds===today;
        return `<td class="cell ${isToday?'today':''}"><input type="number" min="0" step="0.25" data-row="${row.key}" data-date="${ds}" value="${val?fmtHours(val):''}" placeholder="–"/></td>`;
      }).join('');
      const isDraft = row.draft;
      const rowTasks = (projectById(row.projectId)||{}).tasks || [];
      const projSelect = isDraft
        ? `<select class="row-select" data-draft="${row.key}" data-field="projectId">${projects.map(p=>`<option value="${p.id}" ${p.id===row.projectId?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>`
        : `<span class="row-proj">${escapeHtml(proj?proj.name:'')}</span>`;
      const descField = isDraft
        ? `<input class="row-desc-input" data-draft="${row.key}" data-field="description" placeholder="Pick a task or type your own" value="${escapeHtml(row.description)}" list="tasks-${row.key}"/>
           <datalist id="tasks-${row.key}">${rowTasks.map(t=>`<option value="${escapeHtml(t.name)}"></option>`).join('')}</datalist>`
        : `<span class="row-desc" title="${escapeHtml(row.description)}">${escapeHtml(row.description)||'<span style=\"color:var(--text-faint)\">No description</span>'}</span>`;
      bodyRows += `
      <tr class="entry-row">
        <td><div class="row-label-cell"><span class="proj-dot" style="background:${proj?proj.color:'#888'}"></span>
          <div class="row-text">${isDraft?projSelect:''}${descField}</div>
        </div></td>
        ${cells}
        <td class="row-total">${total?fmtHours(total)+'h':''}</td>
        <td class="row-del"><button class="btn ghost" data-delrow="${row.key}" aria-label="Delete row">✕</button></td>
      </tr>`;
    });
  }

  let dayTotals = days.map(()=>0);
  rows.forEach(row=>{ days.forEach((d,i)=>{ dayTotals[i]+=(row.byDate[fmtDate(d)]||0); }); });
  const grandTotal = dayTotals.reduce((a,b)=>a+b,0);
  const totalsCells = dayTotals.map((t,i)=>{ const isToday=fmtDate(days[i])===today; return `<td class="row-total ${isToday?'cell today':''}">${t?fmtHours(t):'–'}</td>`; }).join('');

  return `
  <div class="card">
    <div class="card-head">
      <h2>Your weekly timesheet</h2>
      <div class="week-nav">
        <button class="nav-btn" id="weekPrev">‹</button>
        <span class="week-label">${formatWeekLabel(days)}</span>
        <button class="nav-btn" id="weekNext">›</button>
        <button class="btn" id="weekToday">This week</button>
      </div>
    </div>
    <table class="sheet">
      <thead><tr><th class="row-label">Project / description</th>${dayHeaders}<th>Total</th><th></th></tr></thead>
      <tbody>${bodyRows}</tbody>
      <tfoot><tr class="totals-row"><td>Daily total</td>${totalsCells}<td class="row-total">${grandTotal?fmtHours(grandTotal)+'h':'0h'}</td><td></td></tr></tfoot>
    </table>
    <div style="margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button class="btn primary" id="addRow">+ Add row</button>
      <span style="width:1px;height:20px;background:var(--border);"></span>
      <select class="row-select" id="templateSelect" style="max-width:180px;">
        <option value="">Saved templates…</option>
        ${templates.map(t=>`<option value="${t.id}" ${selectedTemplateId===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
      <button class="btn" id="applyWeekBtn" ${templates.length?'':'disabled'}>Apply to week</button>
      <button class="btn" id="applyMonthBtn" ${templates.length?'':'disabled'}>Apply to month</button>
      <button class="btn ghost" id="deleteTplBtn" ${templates.length?'':'disabled'}>Delete</button>
      <span style="flex:1;"></span>
      <button class="btn" id="saveTplBtn">Save week as template</button>
    </div>
  </div>`;
}
function formatWeekLabel(days){
  const opts={month:'short',day:'numeric'};
  return days[0].toLocaleDateString('en-US',opts)+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

      <div class="stat-box"><div class="label">Projects</div><div class="value">${byProj.length}</div></div>
    </div>
    <div style="margin-bottom:18px;">${bars}</div>
    <div class="export-row">
      <button class="btn primary" id="exportCsv">Export entries (CSV)</button>
      <button class="btn" id="exportXlsx">Export entries (XLSX)</button>
      <span style="width:1px;height:28px;background:var(--border);"></span>
      <button class="btn primary" id="exportSummaryPdf">Export summary (PDF)</button>
      <button class="btn" id="exportSummary">Export summary (CSV)</button>

function renderProjects(){
  const rows = projects.map(p=>{
    const canEdit = profile.is_admin || p.owner_id===session.user.id;
    const isMine = p.owner_id===session.user.id;
    const tracked = totalTrackedForProject(p.id);
    const tasks = p.tasks || [];
    const taskChips = tasks.length
      ? tasks.map(t=>`<span class="task-chip">${escapeHtml(t.name)}${canEdit ? `<button data-deltask="${p.id}|${t.id}" aria-label="Remove task">✕</button>` : ''}</span>`).join('')
      : `<span style="font-size:11.5px;color:var(--text-faint);">No tasks yet.</span>`;
    const nameCell = canEdit
      ? `<input class="row-desc-input" data-projfield="name" data-pid="${p.id}" value="${escapeHtml(p.name)}" style="max-width:220px;"/>`
      : `<span>${escapeHtml(p.name)}</span>`;
    const clientCell = canEdit
      ? `<input class="row-desc-input" data-projfield="client" data-pid="${p.id}" value="${escapeHtml(p.client)}" placeholder="Client name" style="max-width:220px;"/>`
      : `<span>${escapeHtml(p.client)||'–'}</span>`;
    const ownerTag = !isMine && !profile.is_admin ? `<span style="font-size:10.5px;color:var(--text-faint);margin-left:6px;">shared</span>` : '';
    return `
    <tr class="entry-row">
      <td><div class="row-label-cell"><span class="proj-dot" style="background:${p.color}"></span>${nameCell}${ownerTag}</div></td>
      <td>${clientCell}</td>
      <td class="row-total">${tracked?fmtHours(tracked)+'h':'0h'}</td>
      <td class="row-del">${canEdit ? `<button class="btn ghost" data-delproj="${p.id}" aria-label="Delete project">✕</button>` : ''}</td>
    </tr>
    <tr class="task-row">
      <td colspan="4">
        <div class="task-list">${taskChips}</div>
        ${canEdit ? `
        <div class="task-add">
          <input class="row-desc-input" data-newtask="${p.id}" placeholder="Add a task under this project"/>
          <button class="btn" data-addtaskbtn="${p.id}">+ Add task</button>
        </div>` : ''}
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-head">
      <h2>Projects</h2>
      <span style="font-size:12px;color:var(--text-faint);">Everyone can see all projects. You can only edit or add tasks to the ones you created.</span>
    </div>
    <table class="sheet">
      <thead><tr><th class="row-label">Name</th><th class="row-label">Client</th><th>Tracked</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4"><div class="empty-state">No projects yet. Add one below.</div></td></tr>`}</tbody>
    </table>
    <div style="margin-top:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:16px;">
      <input class="row-desc-input" id="newProjName" placeholder="Project name" style="max-width:220px;"/>
      <input class="row-desc-input" id="newProjClient" placeholder="Client (optional)" style="max-width:220px;"/>
      <button class="btn primary" id="addProjectBtn">+ Add project</button>
    </div>
  </div>`;
}

function renderTeam(){
  const byUser = reportByUser();
  const total = byUser.reduce((a,b)=>a+b.hours,0);
  const rows = byUser.length ? byUser.map(r=>{
    const p = profileById(r.userId);
    const pct = total?Math.round((r.hours/total)*1000)/10:0;
    return `<div class="bar-row"><div class="bar-label"><div class="avatar" style="width:20px;height:20px;font-size:9px;">${initials(p?p.email:'??')}</div>${escapeHtml(p?p.email:'Unknown')}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--accent)"></div></div><div class="bar-amt">${hoursToHM(r.hours)} · ${pct}%</div></div>`;
  }).join('') : `<div class="empty-state">No team entries in this range yet.</div>`;
  const ranges = [{key:'week',label:'This week'},{key:'lastweek',label:'Last week'},{key:'month',label:'This month'},{key:'all',label:'All time'}];
  const pills = ranges.map(r=>`<button class="pill ${reportRange===r.key?'active':''}" data-range="${r.key}">${r.label}</button>`).join('');
  return `
  <div class="card">
    <div class="card-head"><h2>Team hours</h2><div class="range-pills">${pills}</div></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="label">Team total</div><div class="value">${hoursToHM(total)}</div></div>
      <div class="stat-box"><div class="label">People logging time</div><div class="value">${byUser.length}</div></div>
      <div class="stat-box"><div class="label">Team size</div><div class="value">${teamProfiles.length}</div></div>
    </div>
    <div>${rows}</div>
    <div class="export-row" style="margin-top:18px;">
      <button class="btn primary" id="exportCsv">Export all entries (CSV)</button>
      <button class="btn" id="exportXlsx">Export all entries (XLSX)</button>
      <button class="btn" id="exportSummaryPdf">Export summary (PDF)</button>
    </div>
  </div>`;
}

// ---------------- event wiring ----------------
function attachHandlers(){
  document.querySelectorAll('.tab-btn').forEach(b=>{ b.onclick=()=>{ activeTab=b.dataset.tab; teamUserFilter='all'; render(); }; });
  const signOutBtn = document.getElementById('signOutBtn');
  if(signOutBtn) signOutBtn.onclick = signOut;

  const punchBtn = document.getElementById('punchBtn');
  if(punchBtn) punchBtn.onclick = ()=>{
    if(timer) stopTimer();
    else{
      const projSel=document.getElementById('timerProject');
      const descInput=document.getElementById('timerDesc');
      startTimer(projSel?projSel.value:null, descInput?descInput.value:'');
    }
  };
  const timerProjSel = document.getElementById('timerProject');
  if(timerProjSel) timerProjSel.addEventListener('change', (e)=>{
    const dl = document.getElementById('timerTasks');
    if(dl){ const tasks=(projectById(e.target.value)||{}).tasks||[]; dl.innerHTML = tasks.map(t=>`<option value="${escapeHtml(t.name)}"></option>`).join(''); }
    const descInput = document.getElementById('timerDesc');
    if(descInput) descInput.value = '';
  });

  if(activeTab==='timesheet'){
    const prev=document.getElementById('weekPrev'), next=document.getElementById('weekNext'), todayBtn=document.getElementById('weekToday');
    if(prev) prev.onclick=()=>{ weekStart=addDays(weekStart,-7); draftRows=[]; render(); };
    if(next) next.onclick=()=>{ weekStart=addDays(weekStart,7); draftRows=[]; render(); };
    if(todayBtn) todayBtn.onclick=()=>{ weekStart=mondayOf(new Date()); draftRows=[]; render(); };

    const addRowBtn=document.getElementById('addRow');
    if(addRowBtn) addRowBtn.onclick=()=>{ draftRows.push({key:'draft-'+uid(), projectId:projects[0]?projects[0].id:null, description:''}); render(); };

    document.querySelectorAll('.cell input').forEach(inp=>{
      inp.addEventListener('change',(e)=>{
        const row = groupRowsForWeek().find(r=>r.key===e.target.dataset.row);
        if(row) setCellHours(row, e.target.dataset.date, e.target.value);
      });
    });
    document.querySelectorAll('[data-delrow]').forEach(btn=>{
      btn.onclick=()=>{ const row=groupRowsForWeek().find(r=>r.key===btn.dataset.delrow); if(row) deleteRow(row); };
    });
    document.querySelectorAll('[data-draft]').forEach(el=>{
      const evt = el.tagName==='SELECT' ? 'change' : 'input';
      el.addEventListener(evt, (e)=>{
        const key=e.target.dataset.draft, field=e.target.dataset.field;
        const d = draftRows.find(x=>x.key===key);
        if(d) d[field] = e.target.value;
        if(field==='projectId'){
          const dl = document.getElementById('tasks-'+key);
          if(dl){ const tasks=(projectById(e.target.value)||{}).tasks||[]; dl.innerHTML = tasks.map(t=>`<option value="${escapeHtml(t.name)}"></option>`).join(''); }
          const descInput = document.querySelector('[data-draft="'+key+'"][data-field="description"]');
          if(descInput) descInput.value = '';
          if(d) d.description = '';
        }
      });
    });

    const tplSelect=document.getElementById('templateSelect');
    if(tplSelect) tplSelect.onchange=(e)=>{ selectedTemplateId=e.target.value||null; };
    const applyWeekBtn=document.getElementById('applyWeekBtn');
    if(applyWeekBtn) applyWeekBtn.onclick=()=>{
      const tpl=templates.find(t=>t.id===selectedTemplateId);
      if(!tpl){ alert('Pick a saved template first.'); return; }
      applyTemplateToCurrentWeek(tpl);
    };
    const applyMonthBtn=document.getElementById('applyMonthBtn');
    if(applyMonthBtn) applyMonthBtn.onclick=()=>{
      const tpl=templates.find(t=>t.id===selectedTemplateId);
      if(!tpl){ alert('Pick a saved template first.'); return; }
      if(confirm('Apply "'+tpl.name+'" to every week in this month? Existing hours on matching rows/days will be overwritten.')) applyTemplateToCurrentMonth(tpl);
    };
    const deleteTplBtn=document.getElementById('deleteTplBtn');
    if(deleteTplBtn) deleteTplBtn.onclick=()=>{
      const tpl=templates.find(t=>t.id===selectedTemplateId);
      if(!tpl){ alert('Pick a saved template first.'); return; }
      if(confirm('Delete template "'+tpl.name+'"?')) deleteTemplate(tpl.id);
    };
    const saveTplBtn=document.getElementById('saveTplBtn');
    if(saveTplBtn) saveTplBtn.onclick=()=>{
      const name=prompt('Name this template (e.g. "Standard work week"):');
      if(name===null) return;
      saveCurrentWeekAsTemplate(name.trim()).then(ok=>{ if(!ok) alert('Add some hours to this week before saving it as a template.'); render(); });
    };
  }

  if(activeTab==='reports'){
    document.querySelectorAll('[data-range]').forEach(p=>{ p.onclick=()=>{ reportRange=p.dataset.range; render(); }; });
    const teamFilter=document.getElementById('teamFilterReports');
    if(teamFilter) teamFilter.onchange=(e)=>{ teamUserFilter=e.target.value; render(); };
    const exC=document.getElementById('exportCsv'); if(exC) exC.onclick=exportCsv;
    const exS=document.getElementById('exportSummary'); if(exS) exS.onclick=exportSummaryCsv;
    const exX=document.getElementById('exportXlsx'); if(exX) exX.onclick=exportDetailedXlsx;
    const exP=document.getElementById('exportSummaryPdf'); if(exP) exP.onclick=exportSummaryPdf;
  }

  if(activeTab==='projects'){
    document.querySelectorAll('[data-projfield]').forEach(inp=>{
      inp.addEventListener('change',(e)=>{ renameProject(e.target.dataset.pid, e.target.dataset.projfield, e.target.value).then(render); });
    });
    document.querySelectorAll('[data-delproj]').forEach(btn=>{
      btn.onclick=()=>{
        const p = projectById(btn.dataset.delproj);
        if(!p) return;
        if(confirm('Delete "'+p.name+'"? This also removes all its logged time entries.')) deleteProject(p.id).then(render);
      };
    });
    const addBtn=document.getElementById('addProjectBtn');
    if(addBtn) addBtn.onclick=()=>{
      const name=document.getElementById('newProjName').value;
      const client=document.getElementById('newProjClient').value;
      addProject(name, client).then(ok=>{ if(!ok){ alert('Give the project a name first.'); return; } render(); });
    };
    document.querySelectorAll('[data-deltask]').forEach(btn=>{
      btn.onclick=()=>{ const [pid,tid]=btn.dataset.deltask.split('|'); removeTaskFromProject(pid,tid).then(render); };
    });
    document.querySelectorAll('[data-addtaskbtn]').forEach(btn=>{
      const pid = btn.dataset.addtaskbtn;
      const doAdd = ()=>{
        const input = document.querySelector('[data-newtask="'+pid+'"]');
        if(!input) return;
        addTaskToProject(pid, input.value).then(ok=>{ if(ok) render(); });
      };
      btn.onclick = doAdd;
      const input = document.querySelector('[data-newtask="'+pid+'"]');
      if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
    });
  }

  if(activeTab==='team'){
    document.querySelectorAll('[data-range]').forEach(p=>{ p.onclick=()=>{ reportRange=p.dataset.range; render(); }; });
    const exC=document.getElementById('exportCsv'); if(exC) exC.onclick=exportCsv;
    const exX=document.getElementById('exportXlsx'); if(exX) exX.onclick=exportDetailedXlsx;
    const exP=document.getElementById('exportSummaryPdf'); if(exP) exP.onclick=exportSummaryPdf;
  }
}

// ---------------- init ----------------
(async function init(){
  const stored = sessionStorage.getItem('phtt_timer');
  if(stored){ try{ timer = JSON.parse(stored); }catch(e){} }

  const { data: { session: s } } = await sb.auth.getSession();
  session = s;
  if(session) await loadAll(); else render();

  sb.auth.onAuthStateChange(async (event, s2)=>{
    session = s2;
    if(session){ await loadAll(); }
    else{ profile=null; render(); }
  });
})();

})();
</script>
